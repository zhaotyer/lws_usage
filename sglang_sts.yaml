# Two Nodes Sglang example

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: distributed-sglang
spec:
  replicas: 2   # number of nodes/pods to run distributed sglang
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: distributed-sglang
  serviceName: ""
  template:
    metadata:
      labels:
        app: distributed-sglang
    spec:
      containers:
      - name: sglang-container
        securityContext:
          capabilities:
            add: ["IPC_LOCK"]
        image: harbor.transwarp.io/aip/sglang:v0.4.9.post6-cu126
        imagePullPolicy: IfNotPresent # image may be replaced by official CI versioned image
        command:
        - /bin/bash
        - -c
        # please modify the sglang serving arguments below, as necessary.
        # NOTE: the --expert-parallel-size is for MoE model like DeepSeek-R1
        args:
        - |
          python3 -m sglang.launch_server \
          --model /models/Qwen/Qwen3-30B-A3B  \
          --dist-init-addr sglang-master-pod:5000 \
          --tensor-parallel-size 2 \
          --nnodes 2 \
          --node-rank $POD_INDEX \
          --trust-remote-code \
          --host 0.0.0.0 \
          --port 8000 \
          --enable-metrics \
          --expert-parallel-size 2
        env:
        - name: POD_INDEX     # reflects the node-rank
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        - name: NCCL_DEBUG
          value: INFO
        - name: CUDA_DISABLE_CONTROL
          value: "true"
        resources:
          limits:
            rdma/hca_shared_devices_a: 1
            nvidia.com/gpu: "1"
            memory: 50Gi
            ephemeral-storage: 50Gi
          requests:
            nvidia.com/gpu: "1"
            rdma/hca_shared_devices_a: 1
            ephemeral-storage: 50Gi
            cpu: 4
        volumeMounts:
          - mountPath: /dev/shm
            name: dshm
          - name: nfs-vol
            mountPath: /models   
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 30Gi
      - name: nfs-vol
        nfs:
          server: 172.17.124.32       # ← 这里换成你的 NFS 服务器 IP
          path: /mnt/disk1/zty/models           # ← 这里换成你 NFS 上共享的目录
          readOnly: false
      #- persistentVolumeClaim:
      #  claimName: llm-pvc
      #  name: llm
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-master-pod
spec:
  type: ClusterIP
  selector:
    app: distributed-sglang
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: dist-port
    port: 5000
    targetPort: 5000
---
# the serving service
apiVersion: v1
kind: Service
metadata:
  name: sglang-serving-on-master
spec:
  type: NodePort
  selector:
    app: distributed-sglang
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: serving
    port: 8000
    targetPort: 8000
  - name: metrics
    port: 8080
    targetPort: 8080
