---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lb-main
  labels:
    app: lb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lb
  template:
    metadata:
      labels:
        app: lb
    spec:
      containers:
        - name: sgl-minilb
          image: harbor.transwarp.io/aip-amd/xpu-nvidia/sglang:v0.5.6
          command:
          - python
          - -m
          - sglang_router.launch_router 
          - --pd-disaggregation
          - --prefill
          - http://sglang-prefill2:30000
          - --prefill
          - http://svc-sglang-prefill:30000
          - --decode
          - http://svc-sglang-decode:30000
          - --decode
          - http://sglang-decode2:30000
          - --host
          - 0.0.0.0
          - --port
          -  "8000"
          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: lb-service
spec:
  type: NodePort # NodePort is easy to test, you can also specify `ClusterIP`
  selector:
    app: lb
  ports:
    - name: http
      protocol: TCP
      port: 8000         # Service Port（In-Cluster）
      targetPort: 8000   # Exposed Container
      nodePort: 30800
    - name: metrics
      protocol: TCP
      port: 29000
      targetPort: 29000
      nodePort: 30801

