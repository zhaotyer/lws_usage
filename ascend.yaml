apiVersion: apps/v1
kind: Deployment
metadata:
  name: ascend-deploy
  namespace: llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bge-rerank
  template:
    metadata:
      labels:
        app: bge-rerank
    spec:
      containers:
      - name: rerank-container
        image: harbor.transwarp.io/aip-arm/common/mindie-npu:vllm-ascend
        command: ["/bin/boot.sh"]
        ports:
        - containerPort: 8011
          name: http
        readinessProbe:
          tcpSocket:
            port: 8011
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 1
        volumeMounts:
        - name: model-pvc
          mountPath: /models
          readOnly: true

        - name: shm
          mountPath: /dev/shm

        - name: npu-smi
          mountPath: /usr/local/sbin/npu-smi
          readOnly: true

        - name: ascend-info
          mountPath: /etc/ascend_install.info
          readOnly: true

        - name: ascend-driver
          mountPath: /usr/local/Ascend/driver
          readOnly: true

        resources:
          limits:
            cpu: "4"
            memory: 20Gi
            huawei.com/Ascend910B4-1: "1"
            huawei.com/Ascend910B4-1-memory: "16384"
          requests:
            cpu: "1"
            memory: 4Gi
            huawei.com/Ascend910B4-1: "1"
            huawei.com/Ascend910B4-1-memory: "16384"

      volumes:
      - name: model-pvc
        hostPath:
          path: /mnt/llm32
          type: Directory

      - name: shm
        emptyDir:
          medium: Memory

      - name: npu-smi
        hostPath:
          path: /usr/local/sbin/npu-smi

      - name: ascend-info
        hostPath:
          path: /etc/ascend_install.info

      - name: ascend-driver
        hostPath:
          path: /usr/local/Ascend/driver
