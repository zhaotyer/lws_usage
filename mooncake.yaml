# =========================================================
# mooncake-master Deployment
# =========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mooncake-master
  labels:
    app: mooncake-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mooncake-master
  template:
    metadata:
      labels:
        app: mooncake-master
    spec:
      containers:
        - name: master
          image: harbor.transwarp.io/aip/sglang:glm5-hopper
          imagePullPolicy: IfNotPresent
          command:
            - mooncake_master
          args:
            - --enable_http_metadata_server=true
            - --eviction_high_watermark_ratio=0.95
            - --rpc_address
            - 0.0.0.0
            - --rpc_port
            - "50051"
            - --http_metadata_server_host
            - 0.0.0.0
            - --http_metadata_server_port
            - "8080"
            - --metrics_port
            - "9003"
            - --root_fs_dir
            - /data/mooncache
            - --global_file_segment_size
            - "1099511627776"    
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: grpc
              containerPort: 50051
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9003
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
# =========================================================
# mooncake-master Service
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: mooncake-master
  labels:
    app: mooncake-master
spec:
  selector:
    app: mooncake-master
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9003
      targetPort: 9003
  type: ClusterIP

---
# =========================================================
# mooncake-store Headless Service
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: mooncake-store
  labels:
    app: mooncake-store
spec:
  clusterIP: None
  selector:
    app: mooncake-store
  ports:
    - name: store
      port: 12345
      targetPort: 12345

---
# =========================================================
# mooncake-store DaemonSet
# =========================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mooncake-store
  labels:
    app: mooncake-store
spec:
  selector:
    matchLabels:
      app: mooncake-store
  template:
    metadata:
      labels:
        app: mooncake-store
    spec:
      # 只运行在 dev17 / dev19
      nodeSelector:
        mooncake-store: "true"

      # 等待 master 就绪（强烈推荐）
      # initContainers:
      #   - name: wait-for-master
      #     image: busybox:1.36
      #     command:
      #       - sh
      #       - -c
      #       - |
      #         until nc -z mooncake-master 50051; do
      #           echo "waiting for mooncake-master...";
      #           sleep 2;
      #         done

      containers:
        - name: store
          image: harbor.transwarp.io/aip/sglang:glm5-hopper
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - mooncake.mooncake_store_service
          env:
            - name: MOONCAKE_MASTER
              value: "mooncake-master:50051"
            - name: MOONCAKE_TE_META_DATA_SERVER
              value: "http://mooncake-master:8080/metadata"
            - name: MOONCAKE_PROTOCOL
              value: "rdma"
            - name: MOONCAKE_DEVICE
              value: ""
            - name: MOONCAKE_GLOBAL_SEGMENT_SIZE
              value: "200gb"
            - name: MOONCAKE_LOCAL_BUFFER_SIZE
              value: "0"
          resources:
            requests:
              memory: "210Gi"
              rdma/hca_shared_devices_a: 1
            limits:
              memory: "210Gi"
              rdma/hca_shared_devices_a: 1
          securityContext:
            capabilities:
              add:
              - IPC_LOCK
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - name: nfs-vol
              mountPath: /data/mooncache
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 50Gi
        - name: nfs-vol
          nfs:
            server: 172.17.124.39       # ← 这里换成你的 NFS 服务器 IP
            path: /mnt/disk2/models/kv_cache           # ← 这里换成你 NFS 上共享的目录
            readOnly: false