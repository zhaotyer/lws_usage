apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: distributed-sglang
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distributed-sglang
  serviceName: ""
  template:
    metadata:
      labels:
        app: distributed-sglang
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: dedicated
                operator: In
                values:
                - distributed-sglang
      containers:
      - name: sglang-container
        image: llm226:5000/aip/sglang:v0.5.2rc0-cu126-fix
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -c
        args:
        - |
          export POD_INDEX=$(echo $POD_NAME | awk -F'-' '{print $NF}')
          echo "Pod name: $POD_NAME, Pod index: $POD_INDEX"
          python3 -m sglang.launch_server \
          --model /models/DeepSeek-V3-0324 \
          --dist-init-addr sglang-master-pod:5100 \
          --tensor-parallel-size 16 \
          --watchdog-timeout 36000 \
          --dist-timeout 3600 \
          --allow-auto-truncate
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: NCCL_DEBUG
          value: INFO
        - name: CUDA_DISABLE_CONTROL
          value: "true"
        - name: UNBALANCED_MODEL_LOADING_TIMEOUT_S
          value: "1200"
        resources:
          limits:
            rdma/hca_shared_devices_a: 1
            nvidia.com/gpu: 8
            memory: "200Gi"
            cpu: "10"
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /models
          name: nfs-vol
        securityContext:
          capabilities:
            add: ["IPC_LOCK"]
      # hostNetwork: true
      # dnsPolicy: ClusterFirstWithHostNet
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 100Gi
        name: dshm
      - name: nfs-vol
        hostPath:
          path: /mnt/disk1/models   # 请替换为你的本地目录，例如 /home/yourname/project
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-master-pod
spec:
  type: ClusterIP
  selector:
    app: distributed-sglang
    statefulset.kubernetes.io/pod-name: distributed-sglang-0
  ports:
  - name: dist-port
    port: 5100
    targetPort: 5100
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-serving-on-master
spec:
  type: NodePort
  selector:
    app: distributed-sglang
    statefulset.kubernetes.io/pod-name: distributed-sglang-0
  ports:
  - name: serving
    port: 8000
    targetPort: 8000
    nodePort: 30203
  - name: metrics
    port: 8080
    targetPort: 8080